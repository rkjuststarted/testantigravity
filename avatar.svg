<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0d1120"/>
    </radialGradient>
    <radialGradient id="skin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fbbf7a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="shirt" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Glow rings -->
  <circle cx="200" cy="200" r="160" stroke="url(#glow)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="200" cy="200" r="130" stroke="url(#glow)" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Glow blobs -->
  <ellipse cx="160" cy="280" rx="90" ry="60" fill="#6366f1" filter="url(#soft)" opacity="0.25"/>
  <ellipse cx="260" cy="260" rx="70" ry="50" fill="#22d3ee" filter="url(#soft)" opacity="0.2"/>

  <!-- Body / shirt -->
  <path d="M90 370 C90 300 140 260 200 255 C260 260 310 300 310 370 Z" fill="url(#shirt)" clip-path="url(#circle)"/>

  <!-- Collar -->
  <path d="M175 258 L200 300 L225 258" fill="#4338ca" opacity="0.9"/>

  <!-- Neck -->
  <rect x="182" y="222" width="36" height="42" rx="14" fill="url(#skin)"/>

  <!-- Head -->
  <ellipse cx="200" cy="195" rx="72" ry="80" fill="url(#skin)"/>

  <!-- Ear left -->
  <ellipse cx="130" cy="196" rx="16" ry="22" fill="url(#skin)"/>
  <ellipse cx="131" cy="196" rx="9" ry="14" fill="#e09040" opacity="0.5"/>

  <!-- Ear right -->
  <ellipse cx="270" cy="196" rx="16" ry="22" fill="url(#skin)"/>
  <ellipse cx="269" cy="196" rx="9" ry="14" fill="#e09040" opacity="0.5"/>

  <!-- Hair -->
  <path d="M130 175 C128 115 145 100 200 95 C255 100 272 115 270 175 C265 145 245 130 200 128 C155 130 135 145 130 175 Z" fill="#1a0a00"/>
  <!-- Hair sides -->
  <path d="M130 175 C127 155 128 130 135 120 C138 148 136 162 130 175Z" fill="#1a0a00"/>
  <path d="M270 175 C273 155 272 130 265 120 C262 148 264 162 270 175Z" fill="#1a0a00"/>

  <!-- Eyebrows -->
  <path d="M162 168 Q175 162 190 165" stroke="#1a0a00" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M210 165 Q225 162 238 168" stroke="#1a0a00" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="176" cy="185" rx="14" ry="14" fill="white"/>
  <ellipse cx="224" cy="185" rx="14" ry="14" fill="white"/>
  <!-- iris -->
  <circle cx="178" cy="186" r="9" fill="#2d1b69"/>
  <circle cx="226" cy="186" r="9" fill="#2d1b69"/>
  <!-- pupil -->
  <circle cx="179" cy="187" r="5" fill="#0a0614"/>
  <circle cx="227" cy="187" r="5" fill="#0a0614"/>
  <!-- eye shine -->
  <circle cx="182" cy="183" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="230" cy="183" r="2.5" fill="white" opacity="0.9"/>

  <!-- Nose -->
  <path d="M196 195 Q200 210 204 195" stroke="#c97a30" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <ellipse cx="193" cy="210" rx="5" ry="3.5" fill="#c97a30" opacity="0.4"/>
  <ellipse cx="207" cy="210" rx="5" ry="3.5" fill="#c97a30" opacity="0.4"/>

  <!-- Smile -->
  <path d="M178 222 Q200 238 222 222" stroke="#c97a30" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Glasses -->
  <rect x="158" y="176" width="36" height="22" rx="8" stroke="#6366f1" stroke-width="2.5" fill="rgba(99,102,241,0.08)"/>
  <rect x="206" y="176" width="36" height="22" rx="8" stroke="#6366f1" stroke-width="2.5" fill="rgba(99,102,241,0.08)"/>
  <line x1="194" y1="187" x2="206" y2="187" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  <!-- temples -->
  <line x1="158" y1="187" x2="146" y2="187" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="242" y1="187" x2="254" y2="187" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Code icon badge -->
  <rect x="290" y="80" width="70" height="48" rx="10" fill="rgba(99,102,241,0.85)" opacity="0.95"/>
  <text x="325" y="100" font-family="monospace" font-size="10" fill="white" text-anchor="middle" opacity="0.9">&lt;/&gt;</text>
  <text x="325" y="116" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.7)" text-anchor="middle">DEV</text>

  <!-- Star sparkles -->
  <g opacity="0.7">
    <path d="M60 100 L63 108 L71 108 L65 113 L67 121 L60 116 L53 121 L55 113 L49 108 L57 108 Z" fill="#fbbf24" transform="scale(0.5) translate(60,60)"/>
    <path d="M340 60 L342 66 L348 66 L343 70 L345 76 L340 73 L335 76 L337 70 L332 66 L338 66 Z" fill="#a78bfa" transform="scale(0.6) translate(90,20)"/>
    <circle cx="55" cy="300" r="3" fill="#22d3ee" opacity="0.6"/>
    <circle cx="345" cy="280" r="2.5" fill="#f472b6" opacity="0.7"/>
    <circle cx="80" cy="230" r="2" fill="#6366f1" opacity="0.8"/>
  </g>

  <!-- Bottom gradient overlay -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)" opacity="0.15"/>
</svg>
